<!DOCTYPE html>
<html lang="uk">
<head lang="uk">
    <meta charset="UTF-8">
    <title>My Page</title>


    <link rel="stylesheet" type="text/css" href="main.css" />
</head>
<body>
	<main class="main-container">
		<section class="product-list">
			<div class="search-panel">
				<input type="text" class="search-input" placeholder="Пошук товару">
				<button class="add-product-btn">Пошук</button>
			</div>
			
			<div class="item-container">
				<span class="product-item">Помідори</span>
				<button class="delete-btn">X</button>
			</div>
		</section>

		<aside class="stats">
			<div class="stats-card">
				<h3>Залишилося</h3>
				<span class="product-stat-item">	
					Apple
					<span class="amount">4</span>
				</span>
			</div>
		</aside>	
	</main>
</body>
</html>
