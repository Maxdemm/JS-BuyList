<!DOCTYPE html>
<html lang="uk">
<head lang="uk">
    <meta charset="UTF-8">
    <title>My Page</title>


    <link rel="stylesheet" type="text/css" href="main.css" />
</head>
<body>
	<main class="main-container">
		<section class="product-list">
			<div class="search-panel">
				<input type="text" class="search-input" placeholder="Назва товару">
				<button class="add-product-btn">Додати</button>
			</div>
			
			<div class="item-container">
				<span class="item-name" id="bought-name">Помідори</span>
				
				<div class="quantity-block">
					<span class="count-number">2</span>
				</div>

				<div class="item-actions">
					<button class="buy-btn">Не куплено</button>
				</div>
			</div>

			<div class="item-container">
				<span class="item-name">Печиво</span>
				
				<div class="quantity-block">
					<button class="count-btn minus">−</button>
					<span class="count-number">2</span>
					<button class="count-btn plus">+</button>
				</div>

				<div class="item-actions">
					<button class="buy-btn">Куплено</button>
					<button class="delete-btn">×</button>
				</div>
			</div>

			<div class="item-container">
				<span class="item-name">Сир</span>
				
				<div class="quantity-block">
					<button class="count-btn minus" id="count-minus-1">−</button>
					<span class="count-number">1</span>
					<button class="count-btn plus">+</button>
				</div>

				<div class="item-actions">
					<button class="buy-btn">Куплено</button>
					<button class="delete-btn">×</button>
				</div>
			</div>
		</section>

		<aside class="stats">
    <div class="stats-card">
        <h3>Залишилося</h3>
        <div class="stats-group">
            <span class="product-stat-item">
                Печиво <span class="amount">2</span>
            </span>
            <span class="product-stat-item">
                Сир <span class="amount">1</span>
            </span>
        </div>
        
        <hr class="stats-divider">
        
        <h3>Куплено</h3>
        <div class="stats-group">
            <span class="product-stat-item bought-badge">
                Помідори <span class="amount">2</span>
            </span>
        </div>
    </div>
</aside>	
	</main>
</body>
</html>
